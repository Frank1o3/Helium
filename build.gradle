plugins {
    id 'net.fabricmc.fabric-loom-remap' version "${loom_version}"
    id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

def mcVersion = project.minecraft_version
def buildNumberFile = file("${projectDir}/.build_number")

def getNextBuildNumber = {
    int num = 1
    if (buildNumberFile.exists()) {
        try { num = buildNumberFile.text.trim().toInteger() + 1 } catch (ignored) { num = 1 }
    }
    buildNumberFile.text = "$num"
    return num
}

def getCurrentBuildNumber = {
    if (buildNumberFile.exists()) {
        try { return buildNumberFile.text.trim().toInteger() } catch (ignored) { return 0 }
    }
    return 0
}

base {
    archivesName = project.archives_base_name
}

repositories {
    maven {
        name = 'Shedaniel'
        url = 'https://maven.shedaniel.me/'
    }
    maven {
        name = 'Terraformers'
        url = 'https://maven.terraformersmc.com/releases'
    }
    maven {
        name = 'CaffeineMC'
        url = 'https://maven.caffeinemc.net/releases'
    }
    maven {
        name = 'Modrinth'
        url = 'https://api.modrinth.com/maven'
        content {
            includeGroup 'maven.modrinth'
        }
    }
}

loom {
    accessWidenerPath = file("src/main/resources/helium.accesswidener")
    splitEnvironmentSourceSets()

    mods {
        "helium" {
            sourceSet sourceSets.main
            sourceSet sourceSets.client
        }
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
    
    // cloth config
    modApi("me.shedaniel.cloth:cloth-config-fabric:${project.cloth_config_version}") {
        exclude(group: "net.fabricmc.fabric-api")
    }
    
    modCompileOnly "com.terraformersmc:modmenu:${project.modmenu_version}"
    // Sodium (compile-only, no runtime bundling)
    def sodiumVersion = "mc${project.minecraft_version}-0.7.3-fabric"
    modCompileOnly "maven.modrinth:sodium:${sodiumVersion}"
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": inputs.properties.version
    }
    filesMatching("quilt.mod.json") {
        expand "version": inputs.properties.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    inputs.property "archivesName", project.base.archivesName

    from("LICENSE") {
        rename { "${it}_${inputs.properties.archivesName}" }
    }
}

// ─── Publish Jar ───────────────────────────────────────────────────────────────
// ./gradlew publish - creates a clean, professional release jar
// Output: build/publish/Helium-1.6.1+mc1.21.11.jar

tasks.register('publishJar', Copy) {
    dependsOn remapJar
    group = 'helium'
    description = 'Builds a release-ready jar with a professional name'

    def outputDir = file("${buildDir}/publish")
    def jarName = "Helium-${project.mod_version}+mc${mcVersion}.jar"

    from(remapJar.archiveFile)
    into(outputDir)
    rename { jarName }

    doFirst { outputDir.mkdirs() }
    doLast { println "\n  ✦ Published: ${outputDir}/${jarName}\n" }
}

tasks.register('release') {
    dependsOn publishJar
    group = 'helium'
    description = 'Alias for publishJar - creates release-ready jar'
}

// ─── Dev Build ─────────────────────────────────────────────────────────────────
// ./gradlew buildDev - creates a dev jar with auto-incrementing build number
// Output: build/dev/Helium-1.6.1+mc1.21.11-dev.42.jar

tasks.register('buildDev') {
    dependsOn remapJar
    group = 'helium'
    description = 'Builds a dev jar with auto-incrementing build number'

    outputs.upToDateWhen { false }

    doLast {
        def buildNum = getNextBuildNumber()
        def outputDir = file("${buildDir}/dev")
        def jarName = "Helium-${project.mod_version}+mc${mcVersion}-dev.${buildNum}.jar"

        outputDir.mkdirs()
        copy {
            from remapJar.archiveFile
            into outputDir
            rename { jarName }
        }

        println "\n  ✦ Dev Build #${buildNum}: ${outputDir}/${jarName}\n"
    }
}
